[terminal.shell]
program = "wsl.exe"
args = ["~", "-d", "FedoraLinux-43"]

[colors.primary]
background = "#000000"

[font]
size = 15
normal = { family = "JetBrainsMono Nerd Font", style = "Regular"}
bold = { family = "JetBrainsMono Nerd Font", style = "Bold"}

[selection]
save_to_clipboard = true

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"
